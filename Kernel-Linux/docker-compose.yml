version: "3.9"

services:
  linux-admin-dashboard:
    build: .
    container_name: linux-admin-dashboard
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: "change-me-in-production"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "admin123"
      USER_USERNAME: "user"
      USER_PASSWORD: "user123"
    volumes:
      - ./logs:/app/logs
      - ./instance:/app/instance
      - ./:/app
    privileged: true
    restart: unless-stopped
